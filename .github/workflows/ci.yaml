name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r dev/requirements.txt

      - name: Run integration tests with coverage
        run: python -m pytest tests/unit/ -v --tb=short --cov=custom_components/nanit --cov-fail-under=80

  test-aionanit:
    name: aionanit Library Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -e "packages/aionanit[dev]"

      - name: Run aionanit tests
        run: python -m pytest packages/aionanit/tests/ -v --tb=short

  protobuf-drift:
    name: Protobuf Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install protoc
        run: |
          # Pinned protoc: regenerating with a different version produces
          # spurious diffs, so bump this deliberately alongside the
          # committed *_pb2.py.
          PROTOC_VERSION="29.5"
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d $HOME/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip

      - name: Check S&L protobuf is in sync with its .proto
        run: |
          protoc --python_out=custom_components/nanit/aionanit_sl \
            --pyi_out=custom_components/nanit/aionanit_sl \
            --proto_path=custom_components/nanit/aionanit_sl \
            custom_components/nanit/aionanit_sl/sound_light.proto
          if ! git diff --quiet custom_components/nanit/aionanit_sl/; then
            echo "sound_light_pb2.py/.pyi is out of date with sound_light.proto."
            echo "Regenerate with protoc 29.5 (--python_out --pyi_out) and commit."
            git diff custom_components/nanit/aionanit_sl/
            exit 1
          fi
          echo "sound_light_pb2.py and .pyi are up to date"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r dev/requirements.txt

      - name: Run mypy on aionanit (strict)
        run: mypy packages/aionanit/aionanit --strict --ignore-missing-imports

      - name: Run mypy on integration
        run: mypy custom_components/nanit --config-file pyproject.toml --python-version 3.14
