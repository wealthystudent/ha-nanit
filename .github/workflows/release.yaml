name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Stable release tag to (re)publish, e.g. v1.4.0"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  resolve:
    name: Resolve Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ env.TAG }}"
          is_pre=$(gh release view "${tag}" --json isPrerelease -q .isPrerelease)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [ "${is_pre}" = "false" ] && [[ "${tag}" == v* ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

  ci-gate:
    name: CI Gate
    needs: resolve
    if: needs.resolve.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r dev/requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run integration tests with coverage
        run: python -m pytest tests/unit/ -v --tb=short --cov=custom_components/nanit --cov-fail-under=80

      - name: Run mypy on aionanit (strict)
        run: mypy packages/aionanit/aionanit --strict --ignore-missing-imports

      - name: Run mypy on integration
        run: mypy custom_components/nanit --config-file pyproject.toml --python-version 3.13

      - name: Install aionanit test dependencies
        run: pip install -e "packages/aionanit[dev]"

      - name: Run aionanit tests
        run: python -m pytest packages/aionanit/tests/ -v --tb=short

  publish-stable:
    name: Publish Stable to PyPI
    needs: [resolve, ci-gate]
    if: needs.resolve.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aionanit/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build package
        working-directory: packages/aionanit
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/aionanit/dist/
          skip-existing: true

  attach-artifact:
    name: Attach Release Artifact
    needs: [resolve, ci-gate]
    if: needs.resolve.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Create integration zip
        run: zip -r nanit.zip custom_components/nanit/

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.resolve.outputs.tag }}" nanit.zip --clobber
