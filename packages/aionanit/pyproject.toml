[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aionanit"
version = "1.4.0"
description = "Async Python client for Nanit baby cameras"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.9.0,<4",
    "protobuf>=6,<8",
]

[project.optional-dependencies]
dev = [
    "grpcio-tools==1.80.0",
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "aioresponses==0.7.8",
    "aiohttp==3.13.5",
    "pytest-cov==7.1.0",
]

[tool.setuptools.packages.find]
include = ["aionanit*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
